<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <title>Nexus AI Engine - Ultimate</title>
    <!-- Library Wajib Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #00ffcc;
            --btn-hover: #00ccaa;
            --border-color: #30363d;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        
        .header {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        select {
            background-color: var(--bg-color);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 4px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.7em;
            outline: none;
        }

        #chat-history {
            flex-grow: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            overflow-y: auto;
            font-size: 0.85em;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-msg {
            padding: 8px;
            border-radius: 4px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .user-msg { background-color: #232b36; border-left: 3px solid #58a6ff; }
        .ai-msg { background-color: #1c2128; border-left: 3px solid var(--accent-color); }
        
        textarea {
            width: 100%;
            height: 60px;
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        textarea:focus { outline: none; border-color: var(--accent-color); }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
            padding: 8px;
            font-weight: bold;
            font-family: inherit;
            font-size: 0.8em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover { border-color: var(--text-color); }
        
        #ask-btn { grid-column: span 2; background-color: var(--accent-color); color: var(--bg-color); border: none; font-size: 0.9em; padding: 10px;}
        #ask-btn:hover { background-color: var(--btn-hover); }

        /* Magic Buttons (Hidden by default) */
        .magic-btn { display: none; border-color: var(--accent-color); color: var(--accent-color); }
        .magic-btn:hover { background-color: var(--accent-color); color: var(--bg-color); }
        
        #btn-categorize { border-color: #d2a8ff; color: #d2a8ff; grid-column: span 2;}
        #btn-categorize:hover { background-color: #d2a8ff; color: var(--bg-color); }

        .api-section { margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px; }
        .api-section input { width: 100%; background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; font-family: inherit; font-size: 0.7em;}
    </style>
</head>
<body>
    <div class="header">
        <span>⚡ DAANIERU</span>
        <select id="model-select">
            <option value="gemini-2.5-flash">Flash Mode</option>
            <option value="gemini-2.5-pro">Pro Mode</option>
        </select>
    </div>
    
    <div id="chat-history">
        <div class="chat-msg ai-msg">Sistem Terintegrasi. Mode Pembacaan Seluruh Sheet AKTIF. Siap menerima perintah otomatisasi.</div>
    </div>
    
    <textarea id="prompt" placeholder="[CMD] > Tanya rumus, suruh rapikan data, dll..."></textarea>
    
    <div class="btn-group">
        <button id="ask-btn">EXECUTE_</button>
        
        <!-- Tombol Sihir yang muncul sesuai konteks jawaban AI -->
        <button id="btn-import" class="magic-btn">📥 IMPORT TABEL</button>
        <button id="btn-inject" class="magic-btn">💉 INJECT RUMUS</button>
        <button id="btn-macro" class="magic-btn">▶️ RUN MACRO</button>
        
        <!-- Tombol Fix Kategori -->
        <button id="btn-categorize">🧹 KATEGORIKAN KOLOM YG DIBLOK</button>
    </div>

    <div class="api-section">
        <input type="password" id="api-key" placeholder="API Key...">
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Global Memory
        let chatMemory = [];
        let extractedTable = null;
        let extractedFormula = null;
        let extractedScript = null;

        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                document.getElementById("ask-btn").onclick = runGemini;
                document.getElementById("btn-import").onclick = importTable;
                document.getElementById("btn-inject").onclick = injectFormula;
                document.getElementById("btn-macro").onclick = runMacro;
                document.getElementById("btn-categorize").onclick = smartCategorize;
                
                const savedKey = localStorage.getItem("gemini_api_key_v1");
                if (savedKey) document.getElementById("api-key").value = savedKey;
                document.getElementById("api-key").addEventListener('input', function() {
                    localStorage.setItem("gemini_api_key_v1", this.value.trim());
                });
            }
        });

        function appendChat(role, text) {
            const chatBox = document.getElementById("chat-history");
            const div = document.createElement("div");
            div.className = `chat-msg ${role}-msg`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            if (role === 'user') chatMemory.push(`User: ${text}`);
            if (role === 'ai') chatMemory.push(`AI: ${text}`);
            // Jaga ingatan maksimal 6 percakapan terakhir biar ga over-limit token
            if (chatMemory.length > 6) chatMemory = chatMemory.slice(-6);
        }

        function hideMagicButtons() {
            document.getElementById("btn-import").style.display = "none";
            document.getElementById("btn-inject").style.display = "none";
            document.getElementById("btn-macro").style.display = "none";
            extractedTable = null; extractedFormula = null; extractedScript = null;
        }

        async function getExcelContext() {
            let contextStr = "=== DATA WORKBOOK ===\n";
            let cursor = "";
            let selectedData = "";

            await Excel.run(async (context) => {
                // 1. Baca Kursor (Active Cell)
                const activeCell = context.workbook.getActiveCell();
                activeCell.load("address");

                // 2. Baca Data yang di-blok (Selected Range)
                const selection = context.workbook.getSelectedRange();
                selection.load("values, address");

                // 3. Baca Data tiap Sheet
                const sheets = context.workbook.worksheets;
                sheets.load("items/name");
                await context.sync();

                for (let sheet of sheets.items) {
                    const range = sheet.getUsedRange();
                    range.load("values");
                    await context.sync();
                    contextStr += `[Sheet: ${sheet.name}]\n`;
                    if (range.values && range.values.length > 0) {
                        contextStr += JSON.stringify(range.values.slice(0, 30)) + "\n"; // Limit 30 baris
                    }
                }
                
                cursor = activeCell.address;
                selectedData = `Blok Aktif: ${selection.address}. Isi: ${JSON.stringify(selection.values.slice(0,10))}`;
            });

            return { contextStr, cursor, selectedData };
        }

        async function runGemini() {
            const promptInput = document.getElementById("prompt");
            const prompt = promptInput.value.trim();
            const apiKey = document.getElementById("api-key").value.trim();
            const selectedModel = document.getElementById("model-select").value;

            if (!apiKey || !prompt) return;

            promptInput.value = "";
            appendChat("user", prompt);
            hideMagicButtons();

            try {
                const excelData = await getExcelContext();
                
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: selectedModel });

                // INSTRUKSI DEWA (Mata, Ingatan, Tangan)
                const systemInstruction = `Kamu adalah DAANIERU_AI, engineer otomasi Excel. 
                Data Excel: ${excelData.contextStr}
                POSISI KURSOR USER SEKARANG: ${excelData.cursor} (Jadikan ini target penulisan rumus).
                History Obrolan: ${chatMemory.join("\n")}
                
                ATURAN OUTPUT:
                1. Jika diminta RUMUS (contoh: VLOOKUP ambil data dari Sheet1), berikan rumus yang TEPAT untuk sel ${excelData.cursor}. Tulis rumus di dalam format blockcode \`\`\`excel ... \`\`\`. Pastikan rumus dimulai dengan tanda =.
                2. Jika diminta DATA/TABEL, berikan dalam format Markdown Table standar.
                3. Jika diminta MACRO/Otomasi ribet (misal: "warnai baris ini"), berikan kode JavaScript Office.js dalam \`\`\`javascript ... \`\`\`.
                Jawablah dengan singkat, padat, dan *to the point*.`;

                const fullPrompt = `${systemInstruction}\n\nPerintah User: ${prompt}`;
                
                const result = await model.generateContent(fullPrompt);
                const responseText = await result.response.text();
                
                appendChat("ai", responseText);

                // PARSER: Deteksi apa yang dikasih AI buat nampilin tombol ajaib
                if (responseText.includes("|") && responseText.includes("---")) {
                    extractedTable = parseMarkdownTable(responseText);
                    if (extractedTable.length > 0) document.getElementById("btn-import").style.display = "block";
                }
                
                const formulaMatch = responseText.match(/```excel\n(.*?)\n
```/s) || responseText.match(/`(=.*?)`/);
                if (formulaMatch) {
                    extractedFormula = formulaMatch[1].trim();
                    document.getElementById("btn-inject").style.display = "block";
                }

                const scriptMatch = responseText.match(/```javascript\n(.*?)\n```/s);
                if (scriptMatch) {
                    extractedScript = scriptMatch[1].trim();
                    document.getElementById("btn-macro").style.display = "block";
                }

            } catch (error) {
                appendChat("ai", `[ERROR] ${error.message}`);
            }
        }

        // FITUR 1: INJECT RUMUS OTOMATIS (Zero-Click)
        async function injectFormula() {
            if (!extractedFormula) return;
            await Excel.run(async (context) => {
                const activeCell = context.workbook.getActiveCell();
                activeCell.formulas = [[extractedFormula]];
                activeCell.format.fill.color = "#e6ffed"; // Kasih warna hijau dikit biar ketahuan sukses
                await context.sync();
                appendChat("ai", `⚡ Rumus ${extractedFormula} berhasil ditanam ke Excel!`);
                document.getElementById("btn-inject").style.display = "none";
            });
        }

        // FITUR 2: TABEL OTOMATIS
        function parseMarkdownTable(mdText) {
            let rows = mdText.trim().split('\n').filter(row => row.includes('|'));
            rows = rows.filter(row => !row.match(/\|[-\s]+\|/));
            return rows.map(row => row.split('|').map(c => c.trim()).slice(1, -1));
        }

        async function importTable() {
            if (!extractedTable) return;
            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getActiveWorksheet();
                const activeCell = context.workbook.getActiveCell();
                activeCell.load(["rowIndex", "columnIndex"]);
                await context.sync();
                const targetRange = sheet.getRangeByIndexes(activeCell.rowIndex, activeCell.columnIndex, extractedTable.length, extractedTable[0].length);
                targetRange.values = extractedTable;
                targetRange.format.autofitColumns();
                await context.sync();
                appendChat("ai", `📥 Tabel berhasil di-import!`);
                document.getElementById("btn-import").style.display = "none";
            });
        }

        // FITUR 3: SMART CATEGORIZATION (Pembukuan Otomatis)
        async function smartCategorize() {
            const apiKey = document.getElementById("api-key").value.trim();
            const selectedModel = document.getElementById("model-select").value;
            if (!apiKey) return;

            appendChat("user", "[System Command] > Rapikan/Kategorikan data yang diblok.");
            
            await Excel.run(async (context) => {
                const range = context.workbook.getSelectedRange();
                range.load(["values", "address", "rowIndex", "columnIndex", "rowCount"]);
                await context.sync();

                if (range.values[0].length > 1) {
                    appendChat("ai", "⚠️ Tolong blok 1 kolom saja (kolom deskripsi) untuk dikategorikan.");
                    return;
                }

                appendChat("ai", "⏳ Menganalisa & membuat kategori otomatis...");
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: selectedModel });
                
                const prompt = `Ini adalah list transaksi/data: ${JSON.stringify(range.values)}. 
                Berikan array JSON berisi kategori pendek (1-2 kata) untuk setiap baris. Format WAJIB: ["Kategori1", "Kategori2", ...]. Jangan ada teks lain selain array JSON tersebut.`;
                
                const result = await model.generateContent(prompt);
                let responseText = await result.response.text();
                
                // Bersihkan output AI barangkali ada backticks
                responseText = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                try {
                    const categories = JSON.parse(responseText);
                    const outputRange = context.workbook.worksheets.getActiveWorksheet().getRangeByIndexes(range.rowIndex, range.columnIndex + 1, range.rowCount, 1);
                    
                    // Format data JSON ke format array 2D Excel
                    const excelValues = categories.map(cat => [cat]);
                    outputRange.values = excelValues;
                    outputRange.format.fill.color = "#fff0b3"; // Kasih warna kuning
                    await context.sync();
                    appendChat("ai", `🧹 Kategori berhasil dibuat di sebelah kanan kolom!`);
                } catch (e) {
                    appendChat("ai", `Gagal memparsing JSON dari AI. Coba lagi.`);
                }
            });
        }

        // FITUR 4: EKSEKUSI MACRO JAVASCRIPT
        async function runMacro() {
            if (!extractedScript) return;
            try {
                // Warning: Ini cara paling "hacker" buat eksekusi kode dinamis di Excel JS
                const scriptFunction = new Function('Excel', `return Excel.run(async (context) => { ${extractedScript} await context.sync(); });`);
                await scriptFunction(Excel);
                appendChat("ai", `▶️ Script Macro berhasil dijalankan!`);
                document.getElementById("btn-macro").style.display = "none";
            } catch (e) {
                appendChat("ai", `[ERROR MACRO] Script gagal dieksekusi: ${e.message}`);
            }
        }
    </script>
</body>
</html>
