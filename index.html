<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Engine - DAANIERU POLISHED</title>
    <!-- Office.js API -->
    <script src="[https://appsforoffice.microsoft.com/lib/1/hosted/office.js](https://appsforoffice.microsoft.com/lib/1/hosted/office.js)"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #00ffcc;
            --btn-hover: #00ccaa;
            --border-color: #30363d;
            --user-msg-bg: #232b36;
            --ai-msg-bg: #1c2128;
            --error-red: #ff7b72;
        }
        
        body {
            font-family: 'Segoe UI', 'Consolas', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 98vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        /* HEADER SECTION */
        .header {
            font-size: 1.1em;
            font-weight: 800;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }
        
        select {
            background-color: var(--panel-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.8em;
            cursor: pointer;
            outline: none;
        }

        /* CHAT HISTORY AREA */
        #chat-history {
            flex-grow: 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            overflow-y: auto;
            font-size: 0.9em;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .chat-msg {
            padding: 12px;
            border-radius: 8px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 95%;
            position: relative;
        }

        .user-msg {
            background-color: var(--user-msg-bg);
            border-left: 4px solid #58a6ff;
            align-self: flex-end;
        }

        .ai-msg {
            background-color: var(--ai-msg-bg);
            border-left: 4px solid var(--accent-color);
            align-self: flex-start;
        }

        /* ANIMASI LOADING SPINNER */
        .spinner {
            border: 3px solid rgba(0, 255, 204, 0.2);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            vertical-align: middle;
            font-style: italic;
            color: #8b949e;
        }

        /* INPUT AREA */
        .input-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }
        
        textarea:focus { outline: none; border-color: var(--accent-color); }
        
        /* BUTTONS */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-weight: 700;
            font-family: inherit;
            font-size: 0.8em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
        }
        
        button:hover { border-color: var(--text-color); transform: translateY(-1px); }
        
        #ask-btn {
            grid-column: span 2;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            font-size: 1em;
            padding: 12px;
            margin-bottom: 5px;
        }
        
        #ask-btn:hover { background-color: var(--btn-hover); box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }

        /* MAGIC BUTTONS */
        .magic-btn { display: none; border-color: var(--accent-color); color: var(--accent-color); }
        .magic-btn:hover { background-color: var(--accent-color); color: var(--bg-color); }

        /* STATUS FOOTER */
        .status-footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            font-size: 0.7em;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>⚡ DAANIERU_INTEGRATED</span>
        <select id="model-select">
            <option value="gemini-2.5-flash">MODE: FLASH (FAST)</option>
            <option value="gemini-2.5-pro">MODE: PRO (SMART)</option>
        </select>
    </div>
    
    <div id="chat-history">
        <div class="chat-msg ai-msg">Nexus AI Engine Aktif. Sistem Loading Animasi & Macro Fix telah diterapkan. Fitur Categorize dinonaktifkan.</div>
    </div>
    
    <div class="input-container">
        <textarea id="prompt" placeholder="[CMD] > Berikan instruksi Excel Anda di sini..."></textarea>
        
        <div class="btn-group">
            <button id="ask-btn">EXECUTE COMMAND</button>
            <button id="btn-import" class="magic-btn">📥 IMPORT TABEL</button>
            <button id="btn-inject" class="magic-btn">💉 INJECT RUMUS</button>
            <button id="btn-macro" class="magic-btn">▶️ RUN MACRO</button>
        </div>
    </div>

    <div class="status-footer">
        <span>API_KEY: VERIFIED</span>
        <span>ENGINE: v2.5.POLISHED</span>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "[https://esm.run/@google/generative-ai](https://esm.run/@google/generative-ai)";

        // KUNCI API PERMANEN SAMA PERSIS
        const API_KEY = "AIzaSyCtZCINLMw11DfxEYRQRMfM-qc_jsJRt8M";
        
        let chatHistory = [];
        let lastTableData = null;
        let lastFormulaData = null;
        let lastScriptData = null;

        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                document.getElementById("ask-btn").onclick = handleExecute;
                document.getElementById("btn-import").onclick = executeImport;
                document.getElementById("btn-inject").onclick = executeInject;
                document.getElementById("btn-macro").onclick = executeMacro;
            }
        });

        // FUNGSI UI: TAMPILKAN LOADING SPINNER
        function showLoading() {
            const chatBox = document.getElementById("chat-history");
            const loadingDiv = document.createElement("div");
            loadingDiv.id = "loading-indicator";
            loadingDiv.className = "chat-msg ai-msg";
            loadingDiv.innerHTML = '<div class="spinner"></div><span class="loading-text">Menarik referensi workbook & meracik respon...</span>';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // FUNGSI UI: HAPUS LOADING SPINNER
        function removeLoading() {
            const loadingDiv = document.getElementById("loading-indicator");
            if (loadingDiv) loadingDiv.remove();
        }

        // FUNGSI UI: TAMBAH CHAT
        function addMessage(role, text) {
            const chatBox = document.getElementById("chat-history");
            const msgDiv = document.createElement("div");
            msgDiv.className = `chat-msg ${role}-msg`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            chatHistory.push({ role: role, parts: [{ text: text }] });
            if (chatHistory.length > 10) chatHistory.shift();
        }

        async function getFullContext() {
            let contextResult = { sheetsData: "", activeCell: "", selection: "" };
            try {
                await Excel.run(async (context) => {
                    const activeCell = context.workbook.getActiveCell();
                    activeCell.load("address");
                    const selection = context.workbook.getSelectedRange();
                    selection.load("address, values");
                    const sheets = context.workbook.worksheets;
                    sheets.load("items/name");
                    await context.sync();

                    let allSheetsInfo = "Daftar Data per Sheet:\n";
                    for (let sheet of sheets.items) {
                        const range = sheet.getUsedRange();
                        range.load("values");
                        await context.sync();
                        allSheetsInfo += `--- Sheet: ${sheet.name} ---\n`;
                        if (range.values && range.values.length > 0) {
                            allSheetsInfo += JSON.stringify(range.values.slice(0, 30)) + "\n";
                        }
                    }

                    contextResult.sheetsData = allSheetsInfo;
                    contextResult.activeCell = activeCell.address;
                    contextResult.selection = `User memblok range ${selection.address}: ${JSON.stringify(selection.values.slice(0,5))}`;
                });
            } catch (err) { contextResult.sheetsData = "Gagal mengambil data."; }
            return contextResult;
        }

        async function handleExecute() {
            const promptEl = document.getElementById("prompt");
            const userText = promptEl.value.trim();
            const modelName = document.getElementById("model-select").value;

            if (!userText) return;

            promptEl.value = "";
            document.querySelectorAll('.magic-btn').forEach(b => b.style.display = 'none');
            lastTableData = null; lastFormulaData = null; lastScriptData = null;

            addMessage("user", userText);
            showLoading(); // Tampilkan Animasi Muter

            try {
                const excelContext = await getFullContext();
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: modelName });

                // INSTRUKSI FIX BUG MACRO & ANTI ERROR VS CODE (Pakai string biasa, bukan backtick)
                const masterSystemPrompt = "Identitas: Kamu adalah DAANIERU_AI.\n" +
                "Konteks Workbook: " + excelContext.sheetsData + "\n" +
                "Posisi Kursor: " + excelContext.activeCell + "\n" +
                excelContext.selection + "\n\n" +
                "Aturan Ketat Output:\n" +
                "1. Jika RUMUS EXCEL: Letakkan dalam ```excel \n =RUMUS() \n ```.\n" +
                "2. Jika TABEL: Gunakan format Markdown Tabel.\n" +
                "3. Jika MACRO (Office.js): Berikan HANYA isi kodenya saja di dalam ```javascript ... 
```. JANGAN bungkus dengan 'async function() {}' atau 'Excel.run()'.\n" +
                "Contoh Kode Macro yang BENAR:\n" +
                "```javascript\n" +
                "const sheet = context.workbook.worksheets.getActiveWorksheet();\n" +
                "const activeCell = sheet.getRange(\"B2\");\n" +
                "activeCell.format.fill.color = \"red\";\n" +
                "
```";

                const result = await model.generateContent(masterSystemPrompt + "\n\nPerintah User: " + userText);
                const response = await result.response;
                const responseText = response.text();

                removeLoading(); // Hapus Animasi
                addMessage("ai", responseText);

                // PARSING (Fix error regex /s diganti dengan [\s\S]*?)
                if (responseText.includes("|") && responseText.includes("---")) {
                    lastTableData = parseTable(responseText);
                    if (lastTableData.length > 0) document.getElementById("btn-import").style.display = "block";
                }
                
                const formulaMatch = responseText.match(/```excel\n([\s\S]*?)\n```/) || responseText.match(/`(=.*?)`/);
                if (formulaMatch) {
                    lastFormulaData = formulaMatch[1].trim();
                    document.getElementById("btn-inject").style.display = "block";
                }

                const scriptMatch = responseText.match(/```javascript\n([\s\S]*?)\n
```/);
                if (scriptMatch) {
                    // Cek jika AI bandel masih ngasih fungsi bungkusan
                    let rawScript = scriptMatch[1].trim();
                    if (rawScript.includes("function") && rawScript.includes("Excel.run")) {
                         addMessage("ai", "⚠️ Terdeteksi bug format Macro AI. Memperbaiki otomatis...");
                         rawScript = rawScript.replace(/async function[\s\S]*?Excel\.run\(async\s*\(context\)\s*=>\s*{/g, '');
                         rawScript = rawScript.replace(/}\);?\s*}\s*$/g, '');
                    }
                    lastScriptData = rawScript.trim();
                    document.getElementById("btn-macro").style.display = "block";
                }

            } catch (error) {
                removeLoading();
                addMessage("ai", `[ERROR_SYSTEM]: ${error.message}`);
            }
        }

        function parseTable(text) {
            let lines = text.trim().split('\n').filter(l => l.includes('|'));
            lines = lines.filter(l => !l.match(/\|[-\s]+\|/));
            return lines.map(line => {
                let cells = line.split('|').map(c => c.trim());
                if (cells[0] === "") cells.shift();
                if (cells[cells.length - 1] === "") cells.pop();
                return cells;
            });
        }

        // --- FITUR EKSEKUSI KE EXCEL ---

        async function executeImport() {
            if (!lastTableData) return;
            try {
                await Excel.run(async (context) => {
                    const sheet = context.workbook.worksheets.getActiveWorksheet();
                    const activeCell = context.workbook.getActiveCell();
                    activeCell.load(["rowIndex", "columnIndex"]);
                    await context.sync();

                    const rowSize = lastTableData.length;
                    const colSize = lastTableData[0].length;
                    const range = sheet.getRangeByIndexes(activeCell.rowIndex, activeCell.columnIndex, rowSize, colSize);
                    
                    range.values = lastTableData;
                    range.format.autofitColumns();
                    await context.sync();
                    
                    addMessage("ai", "✅ Data tabel berhasil dipindahkan ke Sheet!");
                    document.getElementById("btn-import").style.display = "none";
                });
            } catch (err) {
                // Bug kotak biru (ListObject) ditangkap di sini
                addMessage("ai", `❌ Gagal Import Tabel: ${err.message}. Pastikan area yang di-klik bebas dari format Tabel Bawaan Excel (Kotak Biru/ListObject) yang bentrok.`);
            }
        }

        async function executeInject() {
            if (!lastFormulaData) return;
            try {
                await Excel.run(async (context) => {
                    const activeCell = context.workbook.getActiveCell();
                    activeCell.formulas = [[lastFormulaData]];
                    activeCell.format.fill.color = "#00ffcc22";
                    await context.sync();
                    
                    addMessage("ai", `💉 Rumus berhasil ditanam.`);
                    document.getElementById("btn-inject").style.display = "none";
                });
            } catch (err) {
                addMessage("ai", `❌ Gagal Inject Rumus: ${err.message}`);
            }
        }

        async function executeMacro() {
            if (!lastScriptData) return;
            try {
                const dynamicMacro = new Function('Excel', `return Excel.run(async (context) => { 
                    ${lastScriptData} 
                    await context.sync(); 
                });`);
                
                await dynamicMacro(Excel);
                addMessage("ai", "▶️ Script Macro sukses dieksekusi.");
                document.getElementById("btn-macro").style.display = "none";
            } catch (err) {
                addMessage("ai", `[ERROR_MACRO]: Kodenya tidak valid. Detil: ${err.message}`);
            }
        }
    </script>
</body>
</html>
