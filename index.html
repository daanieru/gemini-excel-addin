<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <title>Nexus AI Engine</title>
    <!-- Library Wajib Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #00ffcc;
            --border-color: #30363d;
        }
        
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        
        .header {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
        }
        
        button {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-family: inherit;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        
        #response {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            min-height: 80px;
            font-size: 0.9em;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            flex-grow: 1;
        }
        
        .api-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }
        
        .api-label {
            font-size: 0.8em;
            color: #8b949e;
            margin-bottom: 8px;
            display: block;
        }
        
        .api-section input {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.8em;
        }
        
        .api-section input:focus {
            outline: none;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="header">⚡ DAANIERU INTEGRATED AI_</div>
    
    <textarea id="prompt" placeholder="[Input_Command] > Ketik instruksi data di sini..."></textarea>
    <button id="ask-btn">EXECUTE_</button>
    
    <div id="response">Sistem siap. Menunggu perintah...</div>

    <div class="api-section">
        <label class="api-label">🔑 Konfigurasi API Key (Auto-Save)</label>
        <input type="password" id="api-key" placeholder="Paste Gemini API Key di sini...">
    </div>

    <!-- MENGGUNAKAN SDK GOOGLE RESMI (ANTI ERROR URL) -->
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                document.getElementById("ask-btn").onclick = runGemini;
                
                const savedKey = localStorage.getItem("gemini_api_key_v1");
                if (savedKey) {
                    document.getElementById("api-key").value = savedKey;
                }
                
                document.getElementById("api-key").addEventListener('input', function() {
                    localStorage.setItem("gemini_api_key_v1", this.value.trim());
                });
            }
        });

        async function runGemini() {
            const prompt = document.getElementById("prompt").value;
            // Trim ini yang bikin spasi ga sengaja kehapus biar API ga eror
            const apiKey = document.getElementById("api-key").value.trim(); 
            const responseDiv = document.getElementById("response");

            if (!apiKey) {
                responseDiv.innerHTML = "<span style='color: #ff7b72;'>[ERROR] API Key kosong!</span>";
                return;
            }
            if (!prompt) {
                responseDiv.innerHTML = "<span style='color: #d2a8ff;'>[WARN] Instruksi kosong.</span>";
                return;
            }

            responseDiv.innerHTML = "<span style='color: #00ffcc;'>Menghubungkan ke server Google (Secure Mode)... ⏳</span>";

            try {
                let excelContext = "Struktur Workbook:\n";
                await Excel.run(async (context) => {
                    const sheets = context.workbook.worksheets;
                    sheets.load("items/name");
                    await context.sync();
                    for (let sheet of sheets.items) {
                        excelContext += `- Sheet: ${sheet.name}\n`;
                    }
                });

                // Inisialisasi Otak Gemini pakai Library Asli
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const fullPrompt = `${excelContext}\n\nInstruksi User: ${prompt}`;
                
                // Eksekusi
                const result = await model.generateContent(fullPrompt);
                const response = await result.response;
                
                responseDiv.innerText = response.text();

            } catch (error) {
                responseDiv.innerHTML = `<span style='color: #ff7b72;'>[CRITICAL_ERROR] ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
